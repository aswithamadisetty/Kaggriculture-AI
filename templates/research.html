{% extends "base.html" %}

{% block content %}
<div class="row">
    <div class="col-12">
        <h2><i class="bi bi-book"></i> Research</h2>
        <p class="text-muted">Get in-depth research on agricultural topics</p>
        <hr>
    </div>
</div>

<div class="row">
    <div class="col-md-4">
        <div class="card shadow-sm">
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="question" class="form-label">Research Question</label>
                        <textarea class="form-control" id="question" name="question" rows="6" required
                                  placeholder="e.g., What are the best practices for organic farming?"></textarea>
                    </div>
                    <button type="submit" class="btn btn-info w-100 text-white">
                        <i class="bi bi-book"></i> Research
                    </button>
                </form>
            </div>
        </div>
    </div>
    
    <div class="col-md-8">
        {% if response %}
        <div class="card shadow-sm">
            <div class="card-header bg-info text-white">
                <h5 class="mb-0">Research Results</h5>
            </div>
            <div class="card-body">
                <div id="response-content">
                    {{ response|safe }}
                </div>
            </div>
        </div>
        {% else %}
        <div class="card shadow-sm">
            <div class="card-body text-center text-muted">
                <i class="bi bi-book display-1"></i>
                <p class="mt-3">Enter a research question and click "Research"</p>
            </div>
        </div>
        {% endif %}
    </div>
</div>
{% endblock %}
