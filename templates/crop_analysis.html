{% extends "base.html" %}

{% block content %}
<div class="row">
    <div class="col-12">
        <h2><i class="bi bi-plant"></i> Crop Analysis</h2>
        <p class="text-muted">Get detailed analysis for your crop and soil conditions</p>
        <hr>
    </div>
</div>

<div class="row">
    <div class="col-md-4">
        <div class="card shadow-sm">
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="crop" class="form-label">Crop Name</label>
                        <input type="text" class="form-control" id="crop" name="crop" required 
                               placeholder="e.g., Wheat, Rice, Corn">
                    </div>
                    <div class="mb-3">
                        <label for="soil" class="form-label">Soil Type</label>
                        <input type="text" class="form-control" id="soil" name="soil" required
                               placeholder="e.g., Clay, Sandy, Loamy">
                    </div>
                    <div class="mb-3">
                        <label for="location" class="form-label">Location</label>
                        <input type="text" class="form-control" id="location" name="location" required
                               placeholder="e.g., California, USA">
                    </div>
                    <div class="mb-3">
                        <label for="season" class="form-label">Season</label>
                        <input type="text" class="form-control" id="season" name="season" required
                               placeholder="e.g., Spring, Summer, Monsoon">
                    </div>
                    <button type="submit" class="btn btn-success w-100">
                        <i class="bi bi-plant"></i> Analyze
                    </button>
                </form>
            </div>
        </div>
    </div>
    
    <div class="col-md-8">
        {% if response %}
        <div class="card shadow-sm">
            <div class="card-header bg-success text-white">
                <h5 class="mb-0">Analysis Results for {{ crop }}</h5>
            </div>
            <div class="card-body">
                <div id="response-content">
                    {{ response|safe }}
                </div>
            </div>
        </div>
        {% else %}
        <div class="card shadow-sm">
            <div class="card-body text-center text-muted">
                <i class="bi bi-plant display-1"></i>
                <p class="mt-3">Enter crop details and click "Analyze" to get results</p>
            </div>
        </div>
        {% endif %}
    </div>
</div>
{% endblock %}
