{% extends "base.html" %}

{% block content %}
<div class="row">
    <div class="col-12">
        <h2><i class="bi bi-heart-pulse"></i> Disease Advisor</h2>
        <p class="text-muted">Get diagnosis and treatment for plant diseases</p>
        <hr>
    </div>
</div>

<div class="row">
    <div class="col-md-4">
        <div class="card shadow-sm">
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="crop" class="form-label">Crop Name</label>
                        <input type="text" class="form-control" id="crop" name="crop" required
                               placeholder="e.g., Tomato, Wheat">
                    </div>
                    <div class="mb-3">
                        <label for="problem" class="form-label">Describe the Problem</label>
                        <textarea class="form-control" id="problem" name="problem" rows="4" required
                                  placeholder="e.g., Yellow spots on leaves, wilting"></textarea>
                    </div>
                    <button type="submit" class="btn btn-danger w-100">
                        <i class="bi bi-heart-pulse"></i> Diagnose
                    </button>
                </form>
            </div>
        </div>
    </div>
    
    <div class="col-md-8">
        {% if response %}
        <div class="card shadow-sm">
            <div class="card-header bg-danger text-white">
                <h5 class="mb-0">Diagnosis for {{ crop }}</h5>
            </div>
            <div class="card-body">
                <div id="response-content">
                    {{ response|safe }}
                </div>
            </div>
        </div>
        {% else %}
        <div class="card shadow-sm">
            <div class="card-body text-center text-muted">
                <i class="bi bi-heart-pulse display-1"></i>
                <p class="mt-3">Describe the problem and click "Diagnose" to get advice</p>
            </div>
        </div>
        {% endif %}
    </div>
</div>
{% endblock %}
