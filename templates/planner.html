{% extends "base.html" %}

{% block content %}
<div class="row">
    <div class="col-12">
        <h2><i class="bi bi-calendar-check"></i> Farming Planner</h2>
        <p class="text-muted">Create a comprehensive farming plan</p>
        <hr>
    </div>
</div>

<div class="row">
    <div class="col-md-4">
        <div class="card shadow-sm">
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="goal" class="form-label">Describe Your Farming Goal</label>
                        <textarea class="form-control" id="goal" name="goal" rows="6" required
                                  placeholder="e.g., Grow organic tomatoes in California, or setup a sustainable rice farm in monsoon season"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="bi bi-calendar-check"></i> Create Plan
                    </button>
                </form>
            </div>
        </div>
    </div>
    
    <div class="col-md-8">
        {% if response %}
        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0">Your Farming Plan</h5>
            </div>
            <div class="card-body">
                <div id="response-content">
                    {{ response|safe }}
                </div>
            </div>
        </div>
        {% else %}
        <div class="card shadow-sm">
            <div class="card-body text-center text-muted">
                <i class="bi bi-calendar-check display-1"></i>
                <p class="mt-3">Enter your goal and click "Create Plan"</p>
            </div>
        </div>
        {% endif %}
    </div>
</div>
{% endblock %}
